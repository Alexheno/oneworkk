<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- ── Gradients ── -->
    <radialGradient id="g-husk" cx="42%" cy="35%" r="68%">
      <stop offset="0%"   stop-color="#C48845"/>
      <stop offset="30%"  stop-color="#9A6030"/>
      <stop offset="65%"  stop-color="#6A3C18"/>
      <stop offset="100%" stop-color="#3E2008"/>
    </radialGradient>
    <radialGradient id="g-shell" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#2E1206"/>
      <stop offset="100%" stop-color="#1A0A03"/>
    </radialGradient>
    <radialGradient id="g-flesh" cx="44%" cy="36%" r="65%">
      <stop offset="0%"   stop-color="#FEFCF8"/>
      <stop offset="35%"  stop-color="#F8F4EC"/>
      <stop offset="70%"  stop-color="#EDE4D2"/>
      <stop offset="100%" stop-color="#DDD0BA"/>
    </radialGradient>
    <radialGradient id="g-bowl" cx="43%" cy="35%" r="68%">
      <stop offset="0%"   stop-color="#F5F1E8"/>
      <stop offset="40%"  stop-color="#E8DFC8"/>
      <stop offset="75%"  stop-color="#D8CDB4"/>
      <stop offset="100%" stop-color="#C4B49A"/>
    </radialGradient>
    <radialGradient id="g-water" cx="40%" cy="36%" r="62%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.94)"/>
      <stop offset="45%"  stop-color="rgba(242,248,255,0.80)"/>
      <stop offset="80%"  stop-color="rgba(225,238,250,0.65)"/>
      <stop offset="100%" stop-color="rgba(205,225,245,0.48)"/>
    </radialGradient>
    <!-- ── Filters ── -->
    <filter id="f-drop" x="-12%" y="-12%" width="124%" height="132%">
      <feDropShadow dx="0" dy="3" stdDeviation="4.5" flood-color="rgba(0,0,0,0.50)"/>
    </filter>
    <filter id="f-flesh" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="b"/>
      <feFlood flood-color="rgba(255,250,235,0.35)" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="f-bowl-depth" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="b"/>
      <feOffset dx="1" dy="2" result="b2"/>
      <feFlood flood-color="rgba(80,40,10,0.25)" result="c"/>
      <feComposite in="c" in2="b2" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- ── Clip paths ── -->
    <clipPath id="c-outer"><circle cx="50" cy="50" r="47"/></clipPath>
    <clipPath id="c-husk-ring">
      <path d="M50,50 m-47,0 a47,47,0,1,1,94,0 a47,47,0,1,1,-94,0
               M50,50 m-36,0 a36,36,0,1,0,72,0 a36,36,0,1,0,-72,0" fill-rule="evenodd"/>
    </clipPath>
  </defs>

  <!-- ── Ambient shadow ── -->
  <ellipse cx="50" cy="98" rx="36" ry="3.5" fill="rgba(0,0,0,0.22)"/>

  <!-- ── Outer husk ── -->
  <circle cx="50" cy="50" r="47" fill="url(#g-husk)" filter="url(#f-drop)"/>

  <!-- ── Fiber texture — dark fibers ── -->
  <g clip-path="url(#c-husk-ring)" stroke="#2A1005" fill="none">
    <g stroke-width="0.85" opacity="0.38">
      <line x1="50" y1="3" x2="50" y2="14"/><line x1="57.5" y1="3.4" x2="56" y2="14.2"/>
      <line x1="64.8" y1="5.4" x2="61.5" y2="15.8"/><line x1="71.5" y1="9.5" x2="66.5" y2="18.8"/>
      <line x1="77.2" y1="15.5" x2="71" y2="23.2"/><line x1="81.8" y1="22.8" x2="74.5" y2="29.2"/>
      <line x1="85" y1="31.2" x2="77" y2="36.2"/><line x1="86.8" y1="40" x2="78.5" y2="42.8"/>
      <line x1="87" y1="49.2" x2="78.8" y2="49.8"/><line x1="85.8" y1="58.2" x2="77.8" y2="56.5"/>
      <line x1="83" y1="66.8" x2="75.5" y2="63.2"/><line x1="78.5" y1="74.5" x2="72" y2="69.2"/>
      <line x1="72.8" y1="81.2" x2="67.5" y2="75.2"/><line x1="66" y1="86.2" x2="62" y2="79.8"/>
      <line x1="58.5" y1="89.8" x2="55.8" y2="83.2"/><line x1="50.5" y1="91.5" x2="49.5" y2="84.8"/>
      <line x1="42.5" y1="91.2" x2="43" y2="84.5"/><line x1="34.5" y1="89.2" x2="36.5" y2="82.8"/>
      <line x1="27" y1="85.5" x2="30.5" y2="79.5"/><line x1="20.5" y1="80.2" x2="25" y2="74.5"/>
      <line x1="15" y1="73.5" x2="20.8" y2="68.5"/><line x1="10.8" y1="65.8" x2="17.5" y2="61.8"/>
      <line x1="8" y1="57.2" x2="15.5" y2="54.5"/><line x1="6.8" y1="48.2" x2="14.5" y2="46.8"/>
      <line x1="7.2" y1="39.2" x2="14.8" y2="39.2"/><line x1="9.5" y1="30.5" x2="17" y2="32"/>
      <line x1="13.5" y1="22.5" x2="20.5" y2="25.8"/><line x1="19.5" y1="15.8" x2="25.5" y2="20.5"/>
      <line x1="27" y1="10.5" x2="32" y2="16.2"/><line x1="35.5" y1="6.5" x2="39" y2="12.8"/>
      <line x1="44.5" y1="3.5" x2="46.5" y2="10"/>
    </g>
    <!-- ── Light fiber highlights ── -->
    <g stroke-width="0.5" opacity="0.18" stroke="#D0904A">
      <line x1="50" y1="3" x2="50" y2="14"/><line x1="63" y1="5.8" x2="60" y2="16.5"/>
      <line x1="75" y1="13" x2="69" y2="21.5"/><line x1="84" y1="25.5" x2="76.5" y2="31.5"/>
      <line x1="88" y1="42" x2="79.5" y2="44"/><line x1="86.5" y1="60.5" x2="78.5" y2="58"/>
      <line x1="79.5" y1="77" x2="73" y2="71"/><line x1="67" y1="88" x2="62.5" y2="81.5"/>
      <line x1="50" y1="92" x2="49.5" y2="85"/><line x1="32" y1="90" x2="34" y2="83.5"/>
      <line x1="16" y1="80.5" x2="21" y2="75"/><line x1="5.5" y1="63.5" x2="13" y2="60.5"/>
      <line x1="5.5" y1="43" x2="13.5" y2="43"/><line x1="12.5" y1="24" x2="19.5" y2="27.5"/>
      <line x1="28" y1="9" x2="33" y2="15.5"/>
    </g>
  </g>

  <!-- ── Dark inner shell ring ── -->
  <circle cx="50" cy="50" r="37" fill="url(#g-shell)"/>

  <!-- ── Coconut flesh ring ── -->
  <circle cx="50" cy="50" r="32.5" fill="url(#g-flesh)" filter="url(#f-flesh)"/>

  <!-- ── Flesh grain rings (subtle) ── -->
  <g clip-path="url(#c-outer)" opacity="0.06" stroke="#6A4820" fill="none" stroke-width="0.5">
    <circle cx="50" cy="50" r="29"/><circle cx="50" cy="50" r="31.5"/>
  </g>

  <!-- ── Bowl (hollow depression) ── -->
  <ellipse cx="50" cy="51.5" rx="20.5" ry="19" fill="url(#g-bowl)" filter="url(#f-bowl-depth)"/>

  <!-- Bowl rim shadow -->
  <ellipse cx="50" cy="51.5" rx="20.5" ry="19" fill="none"
           stroke="rgba(90,50,15,0.22)" stroke-width="2.8"/>

  <!-- ── Coconut water surface ── -->
  <ellipse cx="50" cy="53.5" rx="12.5" ry="11.2" fill="url(#g-water)"/>

  <!-- Water sheen highlight -->
  <ellipse cx="47" cy="50.8" rx="5.5" ry="3.2"
           fill="rgba(255,255,255,0.32)" transform="rotate(-22,47,50.8)"/>

  <!-- Water bubbles -->
  <circle cx="46" cy="51.5" r="1.2" fill="rgba(255,255,255,0.70)"/>
  <circle cx="54" cy="54.5" r="0.75" fill="rgba(255,255,255,0.55)"/>
  <circle cx="49" cy="57" r="0.55" fill="rgba(255,255,255,0.45)"/>
  <circle cx="52" cy="49.5" r="0.45" fill="rgba(255,255,255,0.40)"/>

  <!-- ── Flesh top highlight ── -->
  <path d="M 21 34 Q 27.5 17 50 15 Q 72.5 17 79 34"
        stroke="rgba(255,255,255,0.42)" stroke-width="2.2"
        fill="none" stroke-linecap="round"/>
  <path d="M 29 29 Q 36 19 50 18 Q 64 19 71 29"
        stroke="rgba(255,252,245,0.22)" stroke-width="1.2"
        fill="none" stroke-linecap="round"/>
</svg>
