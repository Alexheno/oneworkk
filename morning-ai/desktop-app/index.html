<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OneWork</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="widget-container" class="widget-closed">

    <!-- Cercle discret au repos -->
    <div class="knob">
      <div class="knob-inner"></div>
    </div>

    <!-- Carte principale -->
    <div class="card">

      <div class="card-header">
        <div class="card-header-info">
          <div class="card-greeting" id="greeting">Bonjour 👋</div>
          <div class="card-date" id="current-date"></div>
        </div>
        <div class="card-status" id="card-status" title="Analyse IA">
          <span class="status-dot"></span>
        </div>
      </div>

      <!-- Réunions (données réelles) -->
      <div class="meetings-block" id="meetings-block">
        <div class="meetings-header" id="meetings-header">
          <span class="meetings-icon">📅</span>
          <span class="meetings-title" id="meetings-title">Chargement...</span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
        <div class="meetings-list" id="meetings-list"></div>
      </div>

      <!-- Tâches (drag, edit, urgent) -->
      <div class="tasks-list" id="tasks-list"></div>

      <div class="card-footer">
        <span id="footer-status">En attente d'analyse...</span>
      </div>
    </div>

  </div>
  <script src="renderer.js"></script>
</body>
</html>
