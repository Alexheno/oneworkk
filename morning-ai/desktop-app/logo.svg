<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Main ring gradient: ice-blue → indigo → purple → pink → orange -->
    <linearGradient id="gm" x1="85%" y1="5%" x2="15%" y2="95%">
      <stop offset="0%"   stop-color="#8ECDF8"/>
      <stop offset="22%"  stop-color="#6B8EF5"/>
      <stop offset="45%"  stop-color="#9B35FF"/>
      <stop offset="70%"  stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>

    <!-- Highlight: bright white-blue at top-left for 3D gloss -->
    <radialGradient id="gh" cx="30%" cy="28%" r="44%" fx="30%" fy="28%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="40%"  stop-color="#DBEAFE" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#93C5FD" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner depth: subtle lighter edge at highlight zone -->
    <radialGradient id="gd" cx="34%" cy="32%" r="38%">
      <stop offset="0%"   stop-color="#EFF6FF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#EFF6FF" stop-opacity="0"/>
    </radialGradient>

    <!-- Ring donut mask -->
    <mask id="ring">
      <circle cx="100" cy="100" r="80" fill="white"/>
      <circle cx="100" cy="100" r="53" fill="black"/>
    </mask>

    <!-- Ambient glow filter -->
    <filter id="ambient" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="9" result="b"/>
      <feOffset in="b" dx="0" dy="6" result="off"/>
      <feFlood flood-color="#9B35FF" flood-opacity="0.28" result="c"/>
      <feComposite in="c" in2="off" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ambient glow (behind) -->
  <rect width="200" height="200" fill="url(#gm)" mask="url(#ring)"
        filter="url(#ambient)" opacity="0.38"/>

  <!-- Main ring with drop shadow -->
  <g filter="url(#shadow)">
    <rect width="200" height="200" fill="url(#gm)" mask="url(#ring)"/>
  </g>

  <!-- 3D gloss highlight -->
  <rect width="200" height="200" fill="url(#gh)" mask="url(#ring)"/>

  <!-- Inner depth shimmer -->
  <rect width="200" height="200" fill="url(#gd)" mask="url(#ring)"/>
</svg>
