name: Build, Sign & Release OneWork

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-sign-release:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node ──────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Install deps ──────────────────────────────────────────────────────
      - name: Install dependencies
        working-directory: morning-ai/desktop-app
        run: npm install

      # ── 4. Build .exe (unsigned — Azure Trusted Signing signs it after) ──────
      - name: Build .exe
        working-directory: morning-ai/desktop-app
        run: npx electron-builder --win --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # ── 5. Sign .exe with Azure Trusted Signing ───────────────────────────────
      # Azure Trusted Signing = certificat EV géré par Microsoft → bypass SmartScreen immédiat
      # Aucun token USB requis. Docs : https://learn.microsoft.com/trusted-signing
      - name: Sign .exe with Azure Trusted Signing
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE }}
          files-folder: morning-ai/desktop-app/dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # ── 6. Générer latest.yml (sha512 + size du .exe signé) ──────────────────
      - name: Generate latest.yml
        shell: pwsh
        run: |
          $exe     = (Get-ChildItem "morning-ai/desktop-app/dist/*.exe")[0]
          $version = "$env:GITHUB_REF_NAME" -replace '^v', ''
          $size    = $exe.Length
          $dlUrl   = "https://pub-8d4d1b141063478e960d8a6968b13f3e.r2.dev/$($exe.Name)"

          # SHA512 encodé en base64 (format attendu par electron-updater)
          $sha512b64 = [Convert]::ToBase64String(
              [Security.Cryptography.SHA512]::Create().ComputeHash(
                  [IO.File]::ReadAllBytes($exe.FullName)
              )
          )

          $yaml = @"
          version: $version
          files:
            - url: $dlUrl
              sha512: $sha512b64
              size: $size
          path: $dlUrl
          sha512: $sha512b64
          releaseDate: '$(Get-Date -Format 'yyyy-MM-ddTHH:mm:ss.fffZ')'
          "@

          # Dé-indenté proprement
          $yaml = ($yaml -split "`n" | ForEach-Object { $_ -replace '^\s{10}', '' }) -join "`n"
          $yaml | Out-File -FilePath "morning-ai/desktop-app/dist/latest.yml" -Encoding utf8 -NoNewline

          # Passe les infos aux étapes suivantes
          echo "EXE_PATH=$($exe.FullName)"         >> $env:GITHUB_ENV
          echo "EXE_NAME=$($exe.Name)"              >> $env:GITHUB_ENV
          echo "APP_VERSION=$version"               >> $env:GITHUB_ENV

      # ── 7. Upload exe + latest.yml → Cloudflare R2 ───────────────────────────
      - name: Upload to Cloudflare R2
        shell: pwsh
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET:             ${{ secrets.R2_BUCKET_NAME }}
        run: |
          $endpoint = "https://$env:R2_ACCOUNT_ID.r2.cloudflarestorage.com"

          # Upload .exe versionné
          aws s3 cp $env:EXE_PATH `
            "s3://$env:R2_BUCKET/$env:EXE_NAME" `
            --endpoint-url $endpoint `
            --no-progress

          # Upload latest.yml (toujours écrasé — pointe vers le dernier .exe)
          aws s3 cp "morning-ai/desktop-app/dist/latest.yml" `
            "s3://$env:R2_BUCKET/latest.yml" `
            --endpoint-url $endpoint `
            --no-progress `
            --cache-control "no-cache, no-store"

      # ── 8. GitHub Release (avec l'exe signé) ─────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OneWork ${{ github.ref_name }}
          files: morning-ai/desktop-app/dist/*.exe
          body: |
            ## OneWork ${{ github.ref_name }}

            Assistant de bureau intelligent connecté à Microsoft 365.

            ### Installation
            1. Télécharge **OneWork-Setup-${{ github.ref_name }}.exe**
            2. Lance le fichier — l'installation est automatique
            3. Connecte-toi avec ton compte Microsoft 365

            ### Déploiement entreprise (IT Admin)
            Si votre organisation restreint les apps tierces, autorisez OneWork :
            https://login.microsoftonline.com/organizations/adminconsent?client_id=6ba5635c-5459-4c73-a599-04f669c610ad

            ---
            🔒 Vos données Microsoft 365 sont analysées en temps réel. Rien n'est stocké de manière permanente.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
