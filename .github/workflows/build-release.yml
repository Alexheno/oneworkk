name: Build & Release OneWork

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: morning-ai/desktop-app
        run: npm install

      - name: Build .exe
        working-directory: morning-ai/desktop-app
        run: npm run build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: morning-ai/desktop-app/dist/*.exe
          name: OneWork ${{ github.ref_name }}
          body: |
            ## OneWork ${{ github.ref_name }}

            Assistant de bureau intelligent connecté à Microsoft 365.

            ### Installation
            1. Télécharge **OneWork-Setup.exe**
            2. Lance le fichier
            3. Connecte-toi avec ton compte Microsoft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}