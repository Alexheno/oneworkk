name: Build & Release OneWork

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: morning-ai/desktop-app
        run: npm install

      - name: Build .exe (sans publication auto)
        working-directory: morning-ai/desktop-app
        run: npx electron-builder --win --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Create GitHub Release and upload .exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OneWork ${{ github.ref_name }}
          files: morning-ai/desktop-app/dist/*.exe
          body: |
            ## OneWork ${{ github.ref_name }}

            Assistant de bureau intelligent connecté à Microsoft 365.

            ### Installation
            1. Télécharge **OneWork Setup.exe**
            2. Lance le fichier — l'installation est automatique
            3. Connecte-toi avec ton compte Microsoft 365
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}